<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poe Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f7f7f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            border-bottom: 1px solid #e5e5e5;
            padding: 16px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .config-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 200px;
        }

        .config-group label {
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .config-group input,
        .config-group select {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .config-group input:focus,
        .config-group select:focus {
            outline: none;
            border-color: #10a37f;
        }

        .warning {
            font-size: 11px;
            color: #d97706;
            margin-top: 6px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 800px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #10a37f;
            color: white;
        }

        .message.assistant .message-avatar {
            background: #ab68ff;
            color: white;
        }

        .message-content {
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #10a37f;
            color: white;
        }

        .message.error .message-content {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }

        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e5e5e5;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 50px;
            max-height: 200px;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: #10a37f;
        }

        .input-wrapper button {
            padding: 0 24px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-wrapper button:hover:not(:disabled) {
            background: #0d8f6f;
        }

        .input-wrapper button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: inline-block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-4px);
            }
        }

        @media (max-width: 768px) {
            .config-row {
                flex-direction: column;
            }

            .config-group {
                width: 100%;
            }

            .chat-container {
                padding: 12px;
            }

            .message {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="config-row">
            <div class="config-group">
                <label for="apiKey">Poe API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your Poe API key">
                <div class="warning">⚠️ Never share your API key publicly or commit it to version control</div>
            </div>
            <div class="config-group">
                <label for="model">Model</label>
                <input type="text" id="model" list="modelList" placeholder="Select or type model name" value="GPT-4o">
                <datalist id="modelList">
                    <option value="GPT-4o">
                    <option value="Claude-Sonnet-4.6">
                    <option value="Claude-Opus-4.6">
                    <option value="Gemini-3.1-Pro">
                    <option value="Gemini-3-Flash">
                    <option value="GPT-5.4">
                    <option value="Grok-4">
                </datalist>
            </div>
        </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
            <button id="sendButton">Send</button>
        </div>
    </div>

    <script>
        let conversationHistory = [
            { role: "system", content: "You are a helpful assistant." }
        ];
        let isGenerating = false;

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const apiKeyInput = document.getElementById('apiKey');
        const modelInput = document.getElementById('model');

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        function addMessage(role, content, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}${isError ? ' error' : ''}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return contentDiv;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return messageDiv;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const apiKey = apiKeyInput.value.trim();
            const model = modelInput.value.trim();
            const message = messageInput.value.trim();

            if (!apiKey) {
                addMessage('assistant', 'Please enter your Poe API key.', true);
                return;
            }

            if (!model) {
                addMessage('assistant', 'Please select or enter a model name.', true);
                return;
            }

            if (!message) {
                return;
            }

            if (isGenerating) {
                return;
            }

            isGenerating = true;
            sendButton.disabled = true;

            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });

            messageInput.value = '';
            messageInput.style.height = 'auto';

            const typingIndicator = addTypingIndicator();

            try {
                const response = await fetch('https://api.poe.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: conversationHistory,
                        stream: true
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `API error: ${response.status} ${response.statusText}`);
                }

                removeTypingIndicator();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMessage = '';
                let contentDiv = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                break;
                            }

                            try {
                                const parsed = JSON.parse(data);
                                const delta = parsed.choices?.[0]?.delta?.content;
                                if (delta) {
                                    assistantMessage += delta;
                                    if (!contentDiv) {
                                        contentDiv = addMessage('assistant', assistantMessage);
                                    } else {
                                        contentDiv.textContent = assistantMessage;
                                        chatContainer.scrollTop = chatContainer.scrollHeight;
                                    }
                                }
                            } catch (e) {
                                // Skip malformed JSON
                            }
                        }
                    }
                }

                if (assistantMessage) {
                    conversationHistory.push({ role: 'assistant', content: assistantMessage });
                } else {
                    addMessage('assistant', 'No response received from the API.', true);
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `Error: ${error.message}`, true);
                console.error('Error:', error);
            } finally {
                isGenerating = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }
    </script>
</body>
</html>
