<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poe Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f7f7f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            border-bottom: 1px solid #e5e5e5;
            padding: 16px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .header-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }

        .new-chat-btn {
            padding: 8px 16px;
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: #e5e7eb;
            border-color: #9ca3af;
        }

        .config-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 200px;
        }

        .config-group label {
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .config-group input,
        .config-group select {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .config-group input:focus,
        .config-group select:focus {
            outline: none;
            border-color: #10a37f;
        }

        .warning {
            font-size: 11px;
            color: #d97706;
            margin-top: 6px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 800px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #10a37f;
            color: white;
        }

        .message.assistant .message-avatar {
            background: #ab68ff;
            color: white;
        }

        .message-content {
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #10a37f;
            color: white;
        }

        .message.assistant .message-content pre {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message.assistant .message-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message.assistant .message-content pre code {
            background: transparent;
            padding: 0;
        }

        .message.assistant .message-content h1,
        .message.assistant .message-content h2,
        .message.assistant .message-content h3 {
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .message.assistant .message-content h1 {
            font-size: 1.5em;
        }

        .message.assistant .message-content h2 {
            font-size: 1.3em;
        }

        .message.assistant .message-content h3 {
            font-size: 1.1em;
        }

        .message.assistant .message-content ul,
        .message.assistant .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message.assistant .message-content li {
            margin: 4px 0;
        }

        .message.assistant .message-content p {
            margin: 8px 0;
        }

        .message.assistant .message-content a {
            color: #10a37f;
            text-decoration: underline;
        }

        .message.assistant .message-content blockquote {
            border-left: 3px solid #d1d5db;
            padding-left: 12px;
            margin: 8px 0;
            color: #6b7280;
        }

        .message.error .message-content {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }

        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e5e5e5;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 50px;
            max-height: 200px;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: #10a37f;
        }

        .input-wrapper button {
            padding: 0 24px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-wrapper button:hover:not(:disabled) {
            background: #0d8f6f;
        }

        .input-wrapper button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: inline-block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-4px);
            }
        }

        .console-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #1f2937;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: all 0.2s;
        }

        .console-btn:hover {
            background: #374151;
            transform: scale(1.05);
        }

        .console-panel {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 400px;
            max-width: calc(100vw - 40px);
            height: 300px;
            background: #1f2937;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            z-index: 999;
        }

        .console-panel.active {
            display: flex;
        }

        .console-header {
            padding: 12px 16px;
            background: #111827;
            color: white;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-clear {
            background: #374151;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .console-clear:hover {
            background: #4b5563;
        }

        .console-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #e5e7eb;
        }

        .console-log {
            margin: 4px 0;
            padding: 4px 8px;
            border-radius: 3px;
            word-wrap: break-word;
        }

        .console-log.info {
            color: #93c5fd;
        }

        .console-log.error {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
        }

        .console-log.warn {
            color: #fcd34d;
            background: rgba(245, 158, 11, 0.1);
        }

        @media (max-width: 768px) {
            .config-row {
                flex-direction: column;
            }

            .config-group {
                width: 100%;
            }

            .chat-container {
                padding: 12px;
            }

            .message {
                max-width: 100%;
            }

            .console-panel {
                width: calc(100vw - 40px);
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="config-row">
            <div class="config-group">
                <label for="apiKey">Poe API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your Poe API key">
                <div class="warning">⚠️ Never share your API key publicly or commit it to version control</div>
            </div>
            <div class="config-group">
                <label for="model">Model</label>
                <select id="model">
                    <option value="GPT-4o">GPT-4o</option>
                    <option value="GPT-5.4">GPT-5.4</option>
                    <option value="GPT-5.4-Pro">GPT-5.4-Pro</option>
                    <option value="Claude-Sonnet-4.6">Claude-Sonnet-4.6</option>
                    <option value="Claude-Opus-4.6">Claude-Opus-4.6</option>
                    <option value="Gemini-3.1-Pro">Gemini-3.1-Pro</option>
                    <option value="Gemini-3-Flash">Gemini-3-Flash</option>
                    <option value="Gemini-2.5-Flash-Lite">Gemini-2.5-Flash-Lite</option>
                    <option value="Grok-4">Grok-4</option>
                    <option value="Grok-4.1-Fast-Reasoning">Grok-4.1-Fast-Reasoning</option>
                    <option value="Grok-4.1-Fast-Non-Reasoning">Grok-4.1-Fast-Non-Reasoning</option>
                    <option value="Grok-Code-Fast-1">Grok-Code-Fast-1</option>
                    <option value="o4-mini-deep-research">o4-mini-deep-research</option>
                    <option value="o3-deep-research">o3-deep-research</option>
                </select>
            </div>
        </div>
        <div class="header-actions">
            <button class="new-chat-btn" id="newChatBtn">🔄 New Chat</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
            <button id="sendButton">Send</button>
        </div>
    </div>

    <button class="console-btn" id="consoleBtn">📋</button>
    <div class="console-panel" id="consolePanel">
        <div class="console-header">
            Console
            <button class="console-clear" id="consoleClear">Clear</button>
        </div>
        <div class="console-content" id="consoleContent"></div>
    </div>

    <script>
        let conversationHistory = [
            { role: "system", content: "You are a helpful assistant." }
        ];
        let isGenerating = false;

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const apiKeyInput = document.getElementById('apiKey');
        const modelInput = document.getElementById('model');
        const newChatBtn = document.getElementById('newChatBtn');
        const consoleBtn = document.getElementById('consoleBtn');
        const consolePanel = document.getElementById('consolePanel');
        const consoleContent = document.getElementById('consoleContent');
        const consoleClear = document.getElementById('consoleClear');

        // Custom console capture
        function addConsoleLog(message, type = 'info') {
            const logDiv = document.createElement('div');
            logDiv.className = `console-log ${type}`;
            logDiv.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleContent.appendChild(logDiv);
            consoleContent.scrollTop = consoleContent.scrollHeight;
        }

        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        console.log = function(...args) {
            originalLog.apply(console, args);
            addConsoleLog(args.join(' '), 'info');
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addConsoleLog(args.join(' '), 'error');
        };

        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addConsoleLog(args.join(' '), 'warn');
        };

        consoleBtn.addEventListener('click', function() {
            consolePanel.classList.toggle('active');
        });

        consoleClear.addEventListener('click', function() {
            consoleContent.innerHTML = '';
        });

        // Catch unhandled errors
        window.addEventListener('error', function(e) {
            console.error(`Uncaught error: ${e.message} at ${e.filename}:${e.lineno}`);
        });

        console.log('Console initialized');

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        newChatBtn.addEventListener('click', function() {
            if (confirm('Start a new chat? This will clear the current conversation.')) {
                conversationHistory = [
                    { role: "system", content: "You are a helpful assistant." }
                ];
                chatContainer.innerHTML = '';
            }
        });

        function parseMarkdown(text) {
            const parseStartTotal = performance.now();
            let html = text;

            // Escape HTML
            const escapeStart = performance.now();
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            console.log(`Escape HTML: ${(performance.now() - escapeStart).toFixed(2)}ms`);

            // Code blocks (with or without language and newline)
            html = html.replace(/```(\w+)?\n?([\s\S]*?)```/g, function(match, lang, code) {
                return '<pre><code>' + code.trim() + '</code></pre>';
            });

            // Inline code (must come after code blocks)
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Headers
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');

            // Bold (must come before italic to avoid conflicts)
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');

            // Italic (comes after bold)
            html = html.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+?)_/g, '<em>$1</em>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Line breaks for paragraphs
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';

            // Unordered lists
            html = html.replace(/<p>([^\n]*- .+?)<\/p>/gs, function(match, list) {
                let items = list.split('\n').filter(line => line.trim().startsWith('-'));
                if (items.length > 0) {
                    let ul = '<ul>';
                    items.forEach(item => {
                        ul += '<li>' + item.replace(/^- /, '').trim() + '</li>';
                    });
                    ul += '</ul>';
                    return ul;
                }
                return match;
            });

            // Ordered lists
            html = html.replace(/<p>([^\n]*\d+\. .+?)<\/p>/gs, function(match, list) {
                let items = list.split('\n').filter(line => /^\d+\./.test(line.trim()));
                if (items.length > 0) {
                    let ol = '<ol>';
                    items.forEach(item => {
                        ol += '<li>' + item.replace(/^\d+\. /, '').trim() + '</li>';
                    });
                    ol += '</ol>';
                    return ol;
                }
                return match;
            });

            // Blockquotes
            html = html.replace(/^&gt; (.*$)/gm, '<blockquote>$1</blockquote>');

            // Clean up empty paragraphs
            html = html.replace(/<p>\s*<\/p>/g, '');
            html = html.replace(/<p>\s*(<h[123]>)/g, '$1');
            html = html.replace(/(<\/h[123]>)\s*<\/p>/g, '$1');
            html = html.replace(/<p>\s*(<ul>)/g, '$1');
            html = html.replace(/(<\/ul>)\s*<\/p>/g, '$1');
            html = html.replace(/<p>\s*(<ol>)/g, '$1');
            html = html.replace(/(<\/ol>)\s*<\/p>/g, '$1');
            html = html.replace(/<p>\s*(<pre>)/g, '$1');
            html = html.replace(/(<\/pre>)\s*<\/p>/g, '$1');

            const parseEndTotal = performance.now();
            console.log(`Total parseMarkdown: ${(parseEndTotal - parseStartTotal).toFixed(2)}ms`);
            return html;
        }

        function addMessage(role, content, isError = false, parseMarkdownNow = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}${isError ? ' error' : ''}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (role === 'assistant' && !isError && parseMarkdownNow) {
                contentDiv.innerHTML = parseMarkdown(content);
            } else {
                contentDiv.textContent = content;
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return contentDiv;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return messageDiv;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const apiKey = apiKeyInput.value.trim();
            const model = modelInput.value.trim();
            const message = messageInput.value.trim();

            console.log('=== SEND MESSAGE START ===');
            console.log('Model:', model);
            console.log('Message length:', message.length);

            if (!apiKey) {
                addMessage('assistant', 'Please enter your Poe API key.', true);
                return;
            }

            if (!model) {
                addMessage('assistant', 'Please select a model.', true);
                return;
            }

            if (!message) {
                return;
            }

            if (isGenerating) {
                console.log('Already generating, ignoring');
                return;
            }

            isGenerating = true;
            sendButton.disabled = true;

            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });

            messageInput.value = '';
            messageInput.style.height = 'auto';

            const typingIndicator = addTypingIndicator();
            console.log('Typing indicator added');

            try {
                console.log('Sending fetch request...');
                const fetchStart = performance.now();

                const response = await fetch('https://api.poe.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: conversationHistory,
                        stream: true
                    })
                });

                const fetchEnd = performance.now();
                console.log(`Fetch completed in ${(fetchEnd - fetchStart).toFixed(2)}ms`);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `API error: ${response.status} ${response.statusText}`);
                }

                console.log('Response OK, starting stream...');
                removeTypingIndicator();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMessage = '';
                let contentDiv = null;
                let chunkCount = 0;
                let updateCount = 0;
                const streamStart = performance.now();

                while (true) {
                    const readStart = performance.now();
                    const { done, value } = await reader.read();
                    const readEnd = performance.now();

                    if (done) {
                        console.log('Stream complete');
                        break;
                    }

                    chunkCount++;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                console.log('Received [DONE] signal');
                                break;
                            }

                            try {
                                const parsed = JSON.parse(data);
                                const delta = parsed.choices?.[0]?.delta?.content;
                                if (delta) {
                                    assistantMessage += delta;
                                    updateCount++;

                                    if (!contentDiv) {
                                        console.log('Creating message div');
                                        contentDiv = addMessage('assistant', assistantMessage, false, false);
                                    } else {
                                        // Update every 5 chunks to reduce DOM operations
                                        if (updateCount % 5 === 0) {
                                            contentDiv.textContent = assistantMessage;
                                            chatContainer.scrollTop = chatContainer.scrollHeight;
                                        }
                                    }
                                }
                            } catch (e) {
                                console.warn('Failed to parse chunk:', e.message);
                            }
                        }
                    }
                }

                const streamEnd = performance.now();
                console.log(`Stream took ${(streamEnd - streamStart).toFixed(2)}ms`);
                console.log(`Received ${chunkCount} chunks, ${updateCount} updates`);
                console.log(`Message length: ${assistantMessage.length} chars`);

                // Final update with all text
                if (contentDiv && updateCount % 5 !== 0) {
                    contentDiv.textContent = assistantMessage;
                }

                // Parse markdown once at the end
                if (assistantMessage) {
                    console.log('Parsing markdown...');
                    const parseStart = performance.now();
                    if (contentDiv) {
                        contentDiv.innerHTML = parseMarkdown(assistantMessage);
                    }
                    const parseEnd = performance.now();
                    console.log(`Markdown parse took ${(parseEnd - parseStart).toFixed(2)}ms`);

                    conversationHistory.push({ role: 'assistant', content: assistantMessage });
                    console.log('Added to conversation history');
                } else {
                    addMessage('assistant', 'No response received from the API.', true);
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `Error: ${error.message}`, true);
                console.error('Error:', error);
            } finally {
                isGenerating = false;
                sendButton.disabled = false;
                messageInput.focus();
                console.log('=== SEND MESSAGE END ===');
            }
        }
    </script>
</body>
</html>
