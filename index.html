<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f7f7f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            border-bottom: 1px solid #e5e5e5;
            padding: 16px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .header-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }

        .new-chat-btn {
            padding: 8px 16px;
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: #e5e7eb;
            border-color: #9ca3af;
        }

        .config-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 200px;
        }

        .config-group.small {
            flex: 0 0 auto;
            min-width: 120px;
        }

        .config-group label {
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .config-group input,
        .config-group select {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .config-group input:focus,
        .config-group select:focus {
            outline: none;
            border-color: #10a37f;
        }

        .warning {
            font-size: 11px;
            color: #d97706;
            margin-top: 6px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 800px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #10a37f;
            color: white;
        }

        .message.assistant .message-avatar {
            background: #ab68ff;
            color: white;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .message-files {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message-file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 13px;
        }

        .message.user .message-file-item {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .message-file-item img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 6px;
        }

        .message-content {
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #10a37f;
            color: white;
        }

        .message.assistant .message-content pre {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message.assistant .message-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message.assistant .message-content pre code {
            background: transparent;
            padding: 0;
        }

        .message.assistant .message-content h1,
        .message.assistant .message-content h2,
        .message.assistant .message-content h3 {
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .message.assistant .message-content h1 {
            font-size: 1.5em;
        }

        .message.assistant .message-content h2 {
            font-size: 1.3em;
        }

        .message.assistant .message-content h3 {
            font-size: 1.1em;
        }

        .message.assistant .message-content ul,
        .message.assistant .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message.assistant .message-content li {
            margin: 4px 0;
        }

        .message.assistant .message-content p {
            margin: 8px 0;
        }

        .message.assistant .message-content a {
            color: #10a37f;
            text-decoration: underline;
        }

        .message.assistant .message-content blockquote {
            border-left: 3px solid #d1d5db;
            padding-left: 12px;
            margin: 8px 0;
            color: #6b7280;
        }

        .message.error .message-content {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }

        .sources-btn {
            align-self: flex-start;
            padding: 6px 12px;
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sources-btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .sources-panel {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            display: none;
        }

        .sources-panel.active {
            display: block;
        }

        .sources-panel h4 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .source-item {
            font-size: 12px;
            padding: 6px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .source-item:last-child {
            border-bottom: none;
        }

        .source-item a {
            color: #10a37f;
            text-decoration: none;
        }

        .source-item a:hover {
            text-decoration: underline;
        }

        .web-search-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: #dbeafe;
            color: #1e40af;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e5e5e5;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 50px;
            max-height: 200px;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: #10a37f;
        }

        .upload-btn {
            padding: 0 16px;
            height: 50px;
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .input-wrapper button.send-btn {
            padding: 0 24px;
            height: 50px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-wrapper button.send-btn:hover:not(:disabled) {
            background: #0d8f6f;
        }

        .input-wrapper button.send-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .file-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .file-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: #e5e7eb;
            border-radius: 6px;
            font-size: 12px;
        }

        .file-tag button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-size: 14px;
            color: #6b7280;
        }

        .file-tag button:hover {
            color: #374151;
        }

        .typing-indicator {
            display: inline-block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-4px);
            }
        }

        .console-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #1f2937;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: all 0.2s;
        }

        .console-btn:hover {
            background: #374151;
            transform: scale(1.05);
        }

        .console-panel {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 400px;
            max-width: calc(100vw - 40px);
            height: 300px;
            background: #1f2937;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            z-index: 999;
        }

        .console-panel.active {
            display: flex;
        }

        .console-header {
            padding: 12px 16px;
            background: #111827;
            color: white;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-clear {
            background: #374151;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .console-clear:hover {
            background: #4b5563;
        }

        .console-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #e5e7eb;
        }

        .console-log {
            margin: 4px 0;
            padding: 4px 8px;
            border-radius: 3px;
            word-wrap: break-word;
        }

        .console-log.info {
            color: #93c5fd;
        }

        .console-log.error {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
        }

        .console-log.warn {
            color: #fcd34d;
            background: rgba(245, 158, 11, 0.1);
        }

        @media (max-width: 768px) {
            .config-row {
                flex-direction: column;
            }

            .config-group {
                width: 100%;
            }

            .chat-container {
                padding: 12px;
            }

            .message {
                max-width: 100%;
            }

            .console-panel {
                width: calc(100vw - 40px);
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="config-row">
            <div class="config-group small">
                <label for="apiProvider">API Provider</label>
                <select id="apiProvider">
                    <option value="poe">Poe</option>
                    <option value="openai">OpenAI</option>
                </select>
            </div>
            <div class="config-group">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your API key">
                <div class="warning">⚠️ Never share your API key publicly or commit it to version control</div>
            </div>
            <div class="config-group">
                <label for="model">Model</label>
                <select id="model">
                    <option value="GPT-4o">GPT-4o</option>
                </select>
            </div>
        </div>
        <div class="header-actions">
            <button class="new-chat-btn" id="newChatBtn">🔄 New Chat</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <div class="file-preview" id="filePreview"></div>
        <div class="input-wrapper">
            <input type="file" id="fileInput" style="display: none;" accept="image/*,application/pdf,.txt,.doc,.docx" multiple>
            <button class="upload-btn" id="uploadBtn">📎</button>
            <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
            <button class="send-btn" id="sendButton">Send</button>
        </div>
    </div>

    <button class="console-btn" id="consoleBtn">📋</button>
    <div class="console-panel" id="consolePanel">
        <div class="console-header">
            Console
            <button class="console-clear" id="consoleClear">Clear</button>
        </div>
        <div class="console-content" id="consoleContent"></div>
    </div>

    <script>
        let conversationHistory = [
            { role: "system", content: "You are a helpful assistant." }
        ];
        let isGenerating = false;
        let uploadedFiles = [];

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const apiKeyInput = document.getElementById('apiKey');
        const modelInput = document.getElementById('model');
        const apiProviderInput = document.getElementById('apiProvider');
        const newChatBtn = document.getElementById('newChatBtn');
        const consoleBtn = document.getElementById('consoleBtn');
        const consolePanel = document.getElementById('consolePanel');
        const consoleContent = document.getElementById('consoleContent');
        const consoleClear = document.getElementById('consoleClear');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const filePreview = document.getElementById('filePreview');

        const POE_MODELS = [
            'GPT-4o', 'GPT-5.4', 'GPT-5.4-Pro', 'Claude-Sonnet-4.6', 'Claude-Opus-4.6',
            'Gemini-3.1-Pro', 'Gemini-3-Flash', 'Gemini-2.5-Flash-Lite',
            'Grok-4', 'Grok-4.1-Fast-Reasoning', 'Grok-4.1-Fast-Non-Reasoning',
            'Grok-Code-Fast-1', 'o4-mini-deep-research', 'o3-deep-research'
        ];

        const OPENAI_MODELS = [
            'gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-4',
            'gpt-3.5-turbo', 'o1', 'o1-mini', 'o1-preview'
        ];

        // Console capture
        function addConsoleLog(message, type = 'info') {
            const logDiv = document.createElement('div');
            logDiv.className = `console-log ${type}`;
            logDiv.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleContent.appendChild(logDiv);
            consoleContent.scrollTop = consoleContent.scrollHeight;
        }

        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        console.log = function(...args) {
            originalLog.apply(console, args);
            addConsoleLog(args.join(' '), 'info');
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addConsoleLog(args.join(' '), 'error');
        };

        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addConsoleLog(args.join(' '), 'warn');
        };

        consoleBtn.addEventListener('click', function() {
            consolePanel.classList.toggle('active');
        });

        consoleClear.addEventListener('click', function() {
            consoleContent.innerHTML = '';
        });

        window.addEventListener('error', function(e) {
            console.error(`Uncaught error: ${e.message}`);
        });

        console.log('Console initialized');

        // Update models when provider changes
        function updateModelList() {
            const provider = apiProviderInput.value;
            const models = provider === 'poe' ? POE_MODELS : OPENAI_MODELS;

            console.log(`Updating models for ${provider}...`);

            modelInput.innerHTML = '';
            models.forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                option.textContent = model;
                modelInput.appendChild(option);
            });

            console.log(`Loaded ${models.length} models for ${provider}`);
        }

        apiProviderInput.addEventListener('change', updateModelList);

        // File upload
        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            console.log(`Selected ${files.length} file(s)`);

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadedFiles.push({
                        name: file.name,
                        type: file.type,
                        data: event.target.result
                    });
                    updateFilePreview();
                };

                if (file.type.startsWith('image/') || file.type === 'application/pdf') {
                    reader.readAsDataURL(file);
                } else if (file.name.endsWith('.txt') || file.type.startsWith('text/')) {
                    reader.readAsText(file);
                } else {
                    // For other file types, try reading as text
                    reader.readAsText(file);
                }
            });
        });

        function updateFilePreview() {
            filePreview.innerHTML = '';
            uploadedFiles.forEach((file, index) => {
                const tag = document.createElement('div');
                tag.className = 'file-tag';
                tag.innerHTML = `
                    📎 ${file.name}
                    <button onclick="removeFile(${index})">✕</button>
                `;
                filePreview.appendChild(tag);
            });
            console.log(`File preview updated: ${uploadedFiles.length} file(s)`);
        }

        window.removeFile = function(index) {
            uploadedFiles.splice(index, 1);
            updateFilePreview();
        };

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        newChatBtn.addEventListener('click', function() {
            if (confirm('Start a new chat? This will clear the current conversation.')) {
                conversationHistory = [
                    { role: "system", content: "You are a helpful assistant." }
                ];
                chatContainer.innerHTML = '';
                uploadedFiles = [];
                updateFilePreview();
                console.log('New chat started');
            }
        });

        function parseMarkdown(text) {
            let html = text;
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/```(\w+)?\n?([\s\S]*?)```/g, (match, lang, code) => '<pre><code>' + code.trim() + '</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+?)_/g, '<em>$1</em>');
            html = html.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';
            html = html.replace(/<p>([^\n]*- .+?)<\/p>/gs, function(match, list) {
                let items = list.split('\n').filter(line => line.trim().startsWith('-'));
                if (items.length > 0) {
                    let ul = '<ul>';
                    items.forEach(item => ul += '<li>' + item.replace(/^- /, '').trim() + '</li>');
                    ul += '</ul>';
                    return ul;
                }
                return match;
            });
            html = html.replace(/^&gt; (.*$)/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/<p>\s*<\/p>/g, '');
            html = html.replace(/<p>\s*(<h[123]>)/g, '$1');
            html = html.replace(/(<\/h[123]>)\s*<\/p>/g, '$1');
            html = html.replace(/<p>\s*(<ul>)/g, '$1');
            html = html.replace(/(<\/ul>)\s*<\/p>/g, '$1');
            html = html.replace(/<p>\s*(<pre>)/g, '$1');
            html = html.replace(/(<\/pre>)\s*<\/p>/g, '$1');
            return html;
        }

        function addMessage(role, content, isError = false, sources = null, hasWebSearch = false, files = []) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}${isError ? ' error' : ''}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';

            if (hasWebSearch) {
                const badge = document.createElement('div');
                badge.className = 'web-search-badge';
                badge.innerHTML = '🔍 Searched the web';
                wrapper.appendChild(badge);
            }

            // Display files above the message
            if (files && files.length > 0) {
                const filesDiv = document.createElement('div');
                filesDiv.className = 'message-files';
                files.forEach(file => {
                    const fileItem = document.createElement('div');
                    fileItem.className = 'message-file-item';

                    if (file.type.startsWith('image/')) {
                        fileItem.innerHTML = `
                            <span>📷 ${file.name}</span><br>
                            <img src="${file.data}" alt="${file.name}">
                        `;
                    } else if (file.type === 'application/pdf') {
                        fileItem.innerHTML = `📄 ${file.name} (PDF)`;
                    } else {
                        fileItem.innerHTML = `📄 ${file.name}`;
                    }
                    filesDiv.appendChild(fileItem);
                });
                wrapper.appendChild(filesDiv);
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = role === 'assistant' && !isError ? parseMarkdown(content) : content;

            wrapper.appendChild(contentDiv);

            if (sources && sources.length > 0) {
                const sourcesBtn = document.createElement('button');
                sourcesBtn.className = 'sources-btn';
                sourcesBtn.innerHTML = `📚 Sources (${sources.length})`;

                const sourcesPanel = document.createElement('div');
                sourcesPanel.className = 'sources-panel';

                const sourcesTitle = document.createElement('h4');
                sourcesTitle.textContent = 'Sources';
                sourcesPanel.appendChild(sourcesTitle);

                sources.forEach(source => {
                    const item = document.createElement('div');
                    item.className = 'source-item';
                    item.innerHTML = `<a href="${source.url}" target="_blank">${source.title || source.url}</a>`;
                    sourcesPanel.appendChild(item);
                });

                sourcesBtn.addEventListener('click', () => {
                    sourcesPanel.classList.toggle('active');
                });

                wrapper.appendChild(sourcesBtn);
                wrapper.appendChild(sourcesPanel);
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(wrapper);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return contentDiv;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            wrapper.appendChild(contentDiv);
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(wrapper);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return { messageDiv, contentDiv };
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const apiKey = apiKeyInput.value.trim();
            const model = modelInput.value.trim();
            const message = messageInput.value.trim();
            const provider = apiProviderInput.value;

            console.log('=== SEND MESSAGE START ===');
            console.log('Provider:', provider);
            console.log('Model:', model);

            if (!apiKey) {
                addMessage('assistant', 'Please enter your API key.', true);
                return;
            }

            if (!message && uploadedFiles.length === 0) {
                return;
            }

            if (isGenerating) {
                console.log('Already generating');
                return;
            }

            isGenerating = true;
            sendButton.disabled = true;

            // Keep copy of files for display
            const displayFiles = [...uploadedFiles];
            console.log(`Sending with ${displayFiles.length} file(s)`);

            // Build message with files
            let messageContent = message;

            // For Poe: Include text files inline in the message
            if (provider === 'poe' && uploadedFiles.length > 0) {
                uploadedFiles.forEach(file => {
                    if (!file.type.startsWith('image/') && file.type !== 'application/pdf') {
                        // Text files only - include content inline
                        messageContent += `\n\n[File: ${file.name}]\n${file.data}\n[End of file]`;
                    }
                });
            }

            let userMessage = { role: 'user', content: messageContent };

            if (uploadedFiles.length > 0) {
                if (provider === 'openai') {
                    // OpenAI format: content is array with images
                    const content = [{ type: 'text', text: message }];
                    uploadedFiles.forEach(file => {
                        if (file.type.startsWith('image/')) {
                            content.push({
                                type: 'image_url',
                                image_url: { url: file.data }
                            });
                        } else if (file.type !== 'application/pdf') {
                            // For OpenAI text files, include inline (skip PDFs)
                            content[0].text += `\n\n[File: ${file.name}]\n${file.data}\n[End of file]`;
                        }
                    });
                    userMessage.content = content;
                } else {
                    // Poe: Images and PDFs as attachments
                    const attachmentFiles = uploadedFiles.filter(f =>
                        f.type.startsWith('image/') || f.type === 'application/pdf'
                    );
                    if (attachmentFiles.length > 0) {
                        userMessage.attachments = attachmentFiles.map(file => ({
                            url: file.data,
                            content_type: file.type,
                            name: file.name
                        }));
                    }
                }
                console.log(`Files processed (${provider} format):`, userMessage);
            }

            // Display message with files
            addMessage('user', message, false, null, false, displayFiles);
            conversationHistory.push(userMessage);

            messageInput.value = '';
            messageInput.style.height = 'auto';
            uploadedFiles = [];
            updateFilePreview();

            const typing = addTypingIndicator();

            try {
                console.log('Sending request...');
                const url = provider === 'poe'
                    ? 'https://api.poe.com/v1/chat/completions'
                    : 'https://api.openai.com/v1/chat/completions';

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: conversationHistory,
                        stream: true
                    })
                });

                console.log(`Response: ${response.status}`);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `API error: ${response.status}`);
                }

                removeTypingIndicator();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMessage = '';
                let contentDiv = null;
                let updateCount = 0;
                let sources = [];
                let hasWebSearch = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;

                            try {
                                const parsed = JSON.parse(data);
                                const delta = parsed.choices?.[0]?.delta?.content;

                                // Check for web search indicators
                                if (parsed.web_search_results || parsed.choices?.[0]?.web_search) {
                                    hasWebSearch = true;
                                    if (parsed.web_search_results) {
                                        sources = parsed.web_search_results.map(r => ({
                                            title: r.title,
                                            url: r.url
                                        }));
                                    }
                                }

                                if (delta) {
                                    assistantMessage += delta;
                                    updateCount++;

                                    if (!contentDiv) {
                                        const messageDiv = document.createElement('div');
                                        messageDiv.className = 'message assistant';

                                        const avatar = document.createElement('div');
                                        avatar.className = 'message-avatar';
                                        avatar.textContent = '🤖';

                                        const wrapper = document.createElement('div');
                                        wrapper.className = 'message-wrapper';

                                        contentDiv = document.createElement('div');
                                        contentDiv.className = 'message-content';
                                        contentDiv.textContent = assistantMessage;

                                        wrapper.appendChild(contentDiv);
                                        messageDiv.appendChild(avatar);
                                        messageDiv.appendChild(wrapper);
                                        chatContainer.appendChild(messageDiv);
                                    } else {
                                        if (updateCount % 5 === 0) {
                                            contentDiv.textContent = assistantMessage;
                                            chatContainer.scrollTop = chatContainer.scrollHeight;
                                        }
                                    }
                                }
                            } catch (e) {
                                console.warn('Parse error:', e.message);
                            }
                        }
                    }
                }

                console.log(`Stream complete. Message: ${assistantMessage.length} chars`);

                if (assistantMessage) {
                    if (contentDiv) {
                        // Remove old message and add new one with sources
                        contentDiv.parentElement.parentElement.remove();
                        addMessage('assistant', assistantMessage, false, sources, hasWebSearch);
                    }
                    conversationHistory.push({ role: 'assistant', content: assistantMessage });
                } else {
                    addMessage('assistant', 'No response received.', true);
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `Error: ${error.message}`, true);
                console.error('Error:', error);
            } finally {
                isGenerating = false;
                sendButton.disabled = false;
                messageInput.focus();
                console.log('=== SEND MESSAGE END ===');
            }
        }

        // Initialize with Poe models
        try {
            console.log('Initializing model dropdown...');
            updateModelList();
            console.log('Initialization complete');
        } catch (error) {
            console.error('Initialization error:', error.message);
        }
    </script>
</body>
</html>
